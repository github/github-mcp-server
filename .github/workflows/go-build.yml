name: Go Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Build
      run: go build -v ./cmd/...
    
    - name: Run tests
      run: go test -v ./...
    
    - name: Run tests with coverage
      shell: bash
      run: |
        # Only cover packages that have tests. Passing packages without test
        # files to `go test -coverprofile` triggers `go tool covdata`, which
        # fails ("no such tool covdata") for those packages and fails the job.
        pkgs=$(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./...)
        go test -v -coverprofile=coverage.out $pkgs
