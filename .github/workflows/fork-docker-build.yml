name: Fork Docker Build

# This workflow only runs in forks, not in the upstream repository
# It builds and optionally pushes Docker images to your registry

on:
  push:
    branches:
      - main
      - develop
      # Add any other branches you want to build
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: false

env:
  # Docker Hub registry
  REGISTRY: docker.io
  # Docker Hub username and image name
  IMAGE_NAME: herterkairos/github-mcp-server

jobs:
  build:
    # Only run in forks, not in the upstream repo
    if: github.repository != 'github/github-mcp-server'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        # Only login if we're pushing (not on PRs, or manual dispatch with push enabled)
        if: github.event_name != 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.push_image)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: herterkairos
          password: ${{ secrets.DOCKERHUB_TOKEN_READONLY }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Never push - read-only mode for conflict avoidance
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build for single platform for faster builds, or add more platforms as needed
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.ref_name }}
          # Export to Docker for local testing if needed
          load: true

      - name: Build summary
        run: |
          echo "## Docker Build Complete! 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** Read-only (build verification only)" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags (not pushed):" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ Images are built but not pushed to avoid conflicts with upstream." >> $GITHUB_STEP_SUMMARY
